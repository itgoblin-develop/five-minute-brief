    selectors:
      article_list: ".board-list tbody tr, .news-list li"
      title: "td.subject a, .title a"
      link: "td.subject a, .title a"
      date: "td.date, .date"
      detail_content: ".board-view-content, .view-content, .cont-area"

  skt_news:
    name: "SKT 뉴스룸"
