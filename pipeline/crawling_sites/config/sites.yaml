# 멀티사이트 크롤러 설정 파일
# 35개 IT 관련 사이트의 크롤링 설정을 정의한다.
# 셀렉터 검증일: 2026-03-02 (Chrome 직접 방문 확인)

defaults:
  strategy: html
  tier: tier_2
  max_articles: 10
  rate_limit_seconds: 2.0
  timeout_seconds: 15
  retry_count: 3
  max_content_length: 2000
  fetch_full_content: true
  max_pages: 1              # 기본 1페이지만 수집
  pagination_type: none      # none | query_param | path_segment
  pagination_param: page     # 쿼리 파라미터명
  pagination_start: 1        # 시작 페이지 번호

# ============================================================
# 통신 (Telecom) — 5개 사이트
# ============================================================
sites:

  lguplus_press:
    name: "LG U+ 보도자료"
    url: "https://www.lguplus.com/about/ko/corporation/promotion/press-kit"
    category: "통신"
    strategy: selenium  # Next.js SPA — JS 렌더링 필수
    selectors:
      article_list: ".press-list li, .board-list tbody tr, .news-list .item"
      title: "a, .title"
      link: "a"
      date: ".date, .info-date, span.date"
      detail_content: ".view-cont, .board-view-content, article"

  kt_news:
    name: "KT 뉴스"
    url: "https://corp.kt.com/html/promote/news/report_list.html"
