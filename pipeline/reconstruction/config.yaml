# AI 뉴스 재구성 설정 — IT Goblin (IT 도깨비) 피봇

# LLM 설정
llm:
  primary: gemini
  fallback: openai
  temperature: 0.7
  max_output_tokens: 4096  # 본문 확대 (800~2500자) 대응
  retry_count: 3
  retry_delay_base: 1
  request_interval: 0.5

# 클러스터링 설정 (한국어 최적화: char_wb + n_clusters 직접 제어)
clustering:
  method: tfidf_agglomerative
  max_features: 5000
  max_cluster_size: 10
  # IT 6개 카테고리별 목표 클러스터 수 (= 재구성 기사 수, 제한 완화)
  targets:
    mobile_device: { min: 3, max: 15 }
    ai_cloud: { min: 3, max: 15 }
    security_policy: { min: 2, max: 10 }
    dev_tech: { min: 2, max: 10 }
    biz_industry: { min: 3, max: 15 }
    trend_life: { min: 2, max: 10 }

# 품질 검증
validation:
  title_length: { min: 5, max: 35 }
  summary_length: { min: 80, max: 250 }
  bullet_summary_count: 3  # 스칼라 유지 (validator.py 호환)
  bullet_summary_item_length: { min: 10, max: 50 }
  content_length: { min: 800, max: 2500 }
  content_paragraphs: { min: 3, max: 8 }
  hashtag_count: { min: 3, max: 5 }
  hashtag_item_length: { min: 2, max: 8 }
  originality_threshold: 0.8

# 전처리
preprocessing:
  max_content_per_article: 3000
  youtube_handling: merge_only

# DB 설정
database:
  # 환경변수(.env)에서 자동 로드. 여기 비워두면 DB_HOST 등 환경변수 사용.
  # host: localhost
  # port: 5432
  # dbname: five_minute_brief
  # user: postgres
  # password: ""

# IT 6개 카테고리 매핑 (영문 키 → 한국어 표시명)
category_map:
  mobile_device: "모바일·디바이스"
  ai_cloud: "AI·클라우드"
  security_policy: "보안·정책"
  dev_tech: "개발·테크"
  biz_industry: "기업·산업"
  trend_life: "트렌드·라이프"

# 이미지 (Gemini 2.5 Flash Image - Nano Banana)
image:
  enabled: true
  model: gemini-2.5-flash-image
  request_interval: 1.0
  default_images:
    "모바일·디바이스": /assets/default/mobile_device.webp
    "AI·클라우드": /assets/default/ai_cloud.webp
    "보안·정책": /assets/default/security_policy.webp
    "개발·테크": /assets/default/dev_tech.webp
    "기업·산업": /assets/default/biz_industry.webp
    "트렌드·라이프": /assets/default/trend_life.webp
